version: '3.9'

# Standalone / on-premise deployment
# Single-tenant, SQLite database, no external dependencies
# Usage: docker-compose -f docker-compose.standalone.yml up
#
# After startup:
#   Backend API: http://localhost:5000
#   Web UI:      http://localhost:3000
#   Electron terminal: run locally with `cd terminal && npm run electron-dev`

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: standalone
      DATABASE_URL: sqlite:///eventshield.db
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    volumes:
      - ./backend:/app
      - sqlite_data:/app/instance
    command: >
      sh -c "pip install -r requirements-full.txt -q &&
             flask db upgrade &&
             flask run --host=0.0.0.0 --port=5000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  sqlite_data:
  frontend_modules:
